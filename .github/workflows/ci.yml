name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install clang-format (pinned)
        run: pip install 'clang-format==22.1.5'
      - name: Check formatting
        run: |
          find src tests bench -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

  build-gcc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ cmake ninja-build libpcap-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++
      - name: Build
        run: cmake --build build -j
      - name: Unit tests
        run: ctest --test-dir build --output-on-failure -E '^(multicast_test|gap_fill_test)$'
      - name: Integration tests (multicast + gap-fill)
        run: ctest --test-dir build --output-on-failure -R '^(multicast_test|gap_fill_test)$'
      - name: pcap replay smoke (synthetic + gap captures)
        run: |
          ./build/pcap_replay --pcap tests/pcap/itch_synthetic.pcap --speedup 0
          ./build/pcap_replay --pcap tests/pcap/itch_gap.pcap --speedup 0 --skip-gaps

  build-clang:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build libpcap-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++
      - name: Build
        run: cmake --build build -j
      - name: All tests
        run: ctest --test-dir build --output-on-failure

  asan-ubsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build libpcap-dev
      - name: Configure (ASan+UBSan)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DMDFEED_ITCH_ASAN=ON \
            -DMDFEED_ITCH_UBSAN=ON
      - name: Build
        run: cmake --build build -j
      - name: Run sanitized tests
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  fuzz-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build libpcap-dev
      - name: Configure (libFuzzer)
        run: |
          cmake -S . -B build-fuzz -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DMDFEED_ITCH_FUZZ=ON
      - name: Build parser_fuzz
        run: cmake --build build-fuzz --target parser_fuzz -j
      - name: Run fuzz smoke (10000 iters)
        run: ./build-fuzz/parser_fuzz -runs=10000 -max_len=1024

  tsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build libpcap-dev
      - name: Configure (TSan)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DMDFEED_ITCH_TSAN=ON
      - name: Build
        run: cmake --build build -j
      - name: Run TSan stress (GTEST_REPEAT=3)
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
          GTEST_REPEAT: '3'
        run: ./build/tsan_stress_test
      - name: Run TSan over remaining suites
        env:
          TSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure -E '^tsan_stress_test$'

  bench-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ cmake ninja-build libpcap-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build bench targets
        run: cmake --build build --target handler_bench cache_study multicast_bench -j
      - name: Run 100k bench
        run: ./build/handler_bench --count 100000
      - name: Cache-line padding study
        run: ./build/cache_study

  bench-regress:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ cmake ninja-build libpcap-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build bench
        run: cmake --build build --target handler_bench -j
      - name: Regression gate (1M messages, 30% drift)
        run: make bench-regress BUILD_DIR=build BENCH_COUNT=1000000

  docker:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build amd64+arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: mdfeed-itch:ci
